<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hostel Entry Live</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 2.5em;
      margin: 10px 0;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }
    video {
      width: 100%;
      max-width: 640px;
      border: 5px solid white;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
      margin: 20px 0;
    }
    #status {
      font-size: 2em;
      font-weight: bold;
      padding: 20px;
      border-radius: 15px;
      margin: 20px 0;
      min-height: 80px;
      transition: all 0.5s;
    }
    .verified {
      background: #4CAF50;
      box-shadow: 0 0 30px #4CAF50;
    }
    .rejected {
      background: #f44336;
      box-shadow: 0 0 30px #f44336;
    }
    .waiting {
      background: #ff9800;
    }
    footer {
      margin-top: 30px;
      font-size: 0.9em;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hostel Visitor Entry System</h1>
    <p>Live Camera Feed & Real-time Verification</p>
    
    <video id="cam" src="http://192.168.189.84" autoplay playsinline></video>
    
    <div id="status" class="waiting">
      Connecting to camera...
    </div>
    
    <footer>
      Karnavati University • Team: Tisha, Nidhi, Priyanshi, Ritika
    </footer>
  </div>

  <script>
    const statusDiv = document.getElementById('status');
    
    function updateStatus() {
      fetch('/recognize_status')
        .then(r => r.json())
        .then(data => {
          if (data.verified) {
            statusDiv.innerHTML = `
              VERIFIED<br>
              <strong>${data.name}</strong><br>
              ${data.timestamp}
            `;
            statusDiv.className = 'verified';
          } else if (data.name !== "Unknown") {
            statusDiv.innerHTML = `
              NOT VERIFIED<br>
              ${data.name}<br>
              Try again!
            `;
            statusDiv.className = 'rejected';
          } else {
            statusDiv.innerHTML = "No face detected";
            statusDiv.className = 'waiting';
          }
        })
        .catch(() => {
          statusDiv.innerHTML = "Server offline";
          statusDiv.className = 'rejected';
        });
    }

    // Update every 1.5 seconds
    setInterval(updateStatus, 1500);
    updateStatus(); // First call
  </script>
</body>
</html>
